services:
  - type: web
    name: pdf-tools-backend
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: MAX_FILE_SIZE_MB
        value: "25"
      - key: TEMP_DIR
        value: /tmp/pdf-tools
